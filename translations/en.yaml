configuration:
  ha_url:
    name: Home Assistant URL
    description: The URL of your Home Assistant instance (e.g. http://192.168.1.10:8123)
  ha_token:
    name: Long-Lived Access Token
    description: Create one in HA Profile → Long-Lived Access Tokens
  panel_title:
    name: Panel Title
    description: The title shown at the top of the panel
  columns:
    name: Grid Columns
    description: Number of tile columns (2, 3, or 4). Use 3 for portrait iPad.
  theme:
    name: Theme
    description: Visual theme - dark, light, or auto (follows device preference)
  kiosk_mode:
    name: Kiosk Mode
    description: Enable kiosk mode - prevents text selection and optimizes for always-on use
  refresh_interval:
    name: Fallback Poll Interval
    description: How often (seconds) to re-fetch states if WebSocket disconnects
  entities:
    name: Entities
    description: List of Home Assistant entities to display on the panel
