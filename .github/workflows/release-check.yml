name: Release Check

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  version-consistency:
    name: Version & cache-buster consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          if bash scripts/check_release.sh --verbose; then
            echo "✅ All checks passed"
          else
            echo ""
            echo "⚠️ Cache-buster mismatch detected."
            echo "   This is expected during beta development."
            echo "   The stable release script (release.sh stable) will realign everything."
            echo ""
            echo "::warning::Cache-buster out of sync with config.yaml version — expected during beta development"
          fi
