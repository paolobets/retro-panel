name: Build and publish add-on

on:
  push:
    branches:
      - master
    tags:
      - "v*"
      - "beta-*"
  pull_request:
    branches:
      - master

jobs:
  # ── Lint the add-on config ──────────────────────────────────────────────────
  lint:
    name: Lint config.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./retro-panel"

      - name: Validate beta add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./retro-panel-beta"

  # ── Build multi-arch images ─────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: lint
    if: "!startsWith(github.ref, 'refs/tags/beta-')"
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.21
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.21
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' retro-panel/config.yaml | sed 's/version: *"//;s/".*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./retro-panel
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-retro-panel:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-retro-panel:latest
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          labels: |
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            io.hass.version=${{ steps.version.outputs.version }}

  # ── Create GitHub Release on tag push ──────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" retro-panel/CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false

  # ── Build beta images on beta-* tags ───────────────────────────────────────
  build-beta:
    name: Build beta ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/beta-')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.21
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.21
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract beta version from tag
        id: version
        run: |
          # Tag format: beta-X.Y.Z or beta-X.Y.Z-rcN
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#beta-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push beta
        uses: docker/build-push-action@v6
        with:
          context: ./retro-panel
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-retro-panel-beta:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-retro-panel-beta:beta
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          labels: |
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            io.hass.version=${{ steps.version.outputs.version }}

  # ── Update beta config.yaml version so HA detects the update ───────────────
  bump-beta-version:
    name: Bump beta version
    runs-on: ubuntu-latest
    needs: build-beta
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract beta version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#beta-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update beta config.yaml version
        run: |
          sed -i 's/^version: .*/version: "${{ steps.version.outputs.version }}"/' retro-panel-beta/config.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add retro-panel-beta/config.yaml
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "chore(beta): bump version to ${{ steps.version.outputs.version }}"
          git push origin master
