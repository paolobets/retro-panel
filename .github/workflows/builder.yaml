name: Build and publish add-on

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  # ── Lint the add-on config ──────────────────────────────────────────────────
  lint:
    name: Lint config.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./retro-panel"

  # ── Build multi-arch images ─────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' retro-panel/config.yaml | sed 's/version: *"\?//;s/"\?.*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/retro-panel \
            --image "retro-panel" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}"
        env:
          CAS_API_KEY: ${{ secrets.CAS_API_KEY }}

  # ── Create GitHub Release on tag push ──────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" retro-panel/CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
