<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Retro Panel">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="rp-build" content="2130">
  <title>Retro Panel</title>

  <link rel="stylesheet" href="static/css/tokens.css?v=214017">
  <link rel="stylesheet" href="static/css/layout.css?v=214017">
  <link rel="stylesheet" href="static/css/tiles.css?v=214017">
  <link rel="stylesheet" href="static/css/bottom-sheet.css?v=214017">
</head>
<body class="theme-dark">
  <script src="static/js/theme-init.js?v=214017"></script>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">Connessione in corso…</p>
    </div>
  </div>

  <!-- Disconnect Banner -->
  <div id="disconnect-banner" class="hidden">
    <span class="banner-dot"></span>
    Riconnessione…
  </div>

  <!-- Main Panel -->
  <div id="panel" class="hidden">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-top-row">
        <button id="sidebar-toggle" type="button" aria-label="Toggle sidebar">
          <span class="sidebar-toggle-icon">&#9776;</span>
        </button>
        <button id="notif-bell" type="button" aria-label="Notifiche">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          <span id="notif-badge"></span>
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-divider"></div>
      <a id="config-link" href="config" class="sidebar-settings" title="Config" aria-label="Open Config">
        <span class="sidebar-item-icon">&#9881;</span>
        <span class="sidebar-item-label">Config</span>
      </a>
    </nav>

    <!-- Notification drawer backdrop -->
    <div id="notif-backdrop"></div>

    <!-- Notification drawer -->
    <div id="notif-drawer" role="dialog" aria-label="Notifiche">
      <div id="notif-drawer-header">
        <span id="notif-drawer-title">Notifiche</span>
        <button id="notif-read-all-btn" type="button">Segna tutte lette</button>
        <button id="notif-drawer-close" type="button" aria-label="Chiudi">&#10005;</button>
      </div>
      <div id="notif-list"></div>
      <div id="notif-empty">Nessuna notifica</div>
    </div>

    <!-- Main area -->
    <div id="main-area">

      <!-- Header -->
      <header id="panel-header">
        <h1 id="panel-title">Retro <span style="color:var(--c-accent)">PANEL</span><span id="panel-version"></span><!-- DEV-BUILD-TAG-START: rimuovere prima del release stable --><span id="panel-build-tag" style="font-size:10px;font-weight:400;color:var(--c-text-sec);margin-left:8px;padding:2px 6px;border:1px solid var(--c-surface-3);border-radius:8px;vertical-align:middle;"></span><!-- DEV-BUILD-TAG-END --></h1>
        <div id="header-info">
          <span id="panel-date"></span>
          <span id="panel-clock"></span>
        </div>
        <div id="header-sensors"></div>
        <button id="theme-btn" type="button" aria-label="Toggle theme"></button>
        <div id="connection-status" class="status-dot status-connected" title="Connected"></div>
      </header>

      <!-- Content area -->
      <main id="content-area"></main>

    </div>
  </div>

  <!-- Bottom sheet overlay -->
  <div id="bs-overlay"></div>

  <!-- Bottom sheet (light controls) -->
  <div id="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="bs-header">
      <span class="bs-title"></span>
      <button class="bs-close" type="button" aria-label="Close">&#10005;</button>
    </div>
    <div class="bs-body">

      <!-- Brightness section -->
      <div class="bs-section" id="bs-section-bri">
        <div class="bs-section-label">Luminosità</div>
        <div class="bs-row">
          <span class="bs-label-text">Livello</span>
          <span class="bs-val" id="bs-bri-val">100%</span>
        </div>
        <input id="bs-bri-slider" class="bs-slider" type="range" min="1" max="255" value="255">
      </div>

      <!-- Color temperature section -->
      <div class="bs-section" id="bs-section-temp">
        <div class="bs-section-label">Temperatura colore</div>
        <div class="bs-row">
          <span class="bs-label-text">Kelvin</span>
          <span class="bs-val" id="bs-temp-val">3000K</span>
        </div>
        <input id="bs-temp-slider" class="bs-slider" type="range" min="153" max="500" value="300">
      </div>

      <!-- Color (hue) section -->
      <div class="bs-section" id="bs-section-color">
        <div class="bs-section-label">Colore</div>
        <div class="bs-row">
          <span class="bs-label-text">Tonalità</span>
          <span class="bs-val">
            <span class="bs-hue-dot" style="display:inline-block;width:16px;height:16px;border-radius:50%;background:hsl(50,80%,55%);vertical-align:middle;"></span>
          </span>
        </div>
        <input id="bs-hue-slider" class="bs-slider" type="range" min="0" max="360" value="50">
        <div class="bs-swatches">
          <div class="bs-swatch" data-hue="50"  style="background:#fffaf0;" title="Warm white"></div>
          <div class="bs-swatch" data-hue="0"   style="background:#ffffff;" title="White"></div>
          <div class="bs-swatch" data-hue="210" style="background:#2196f3;" title="Blue"></div>
          <div class="bs-swatch" data-hue="270" style="background:#845EC2;" title="Purple"></div>
          <div class="bs-swatch" data-hue="120" style="background:#4caf50;" title="Green"></div>
          <div class="bs-swatch" data-hue="0"   style="background:#f44336;" title="Red"></div>
          <div class="bs-swatch" data-hue="30"  style="background:#ff9800;" title="Orange"></div>
          <div class="bs-swatch" data-hue="330" style="background:#e91e63;" title="Pink"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Climate bottom sheet overlay -->
  <div id="climate-bs-overlay"></div>

  <!-- Climate bottom sheet -->
  <div id="climate-bs">
    <div class="cbs-handle"></div>
    <div class="cbs-header">
      <span class="cbs-title"></span>
      <button class="cbs-close" type="button" aria-label="Close">&#10005;</button>
    </div>
    <div class="cbs-current-reading">
      Temperatura attuale: <span class="cbs-current-val">--</span>
    </div>
    <div class="cbs-temp-section">
      <div class="cbs-section-label">Temperatura target</div>
      <div class="cbs-temp-control">
        <button class="cbs-temp-btn cbs-temp-minus" type="button">&minus;</button>
        <div><span class="cbs-temp-display">--</span><span class="cbs-temp-unit">&deg;C</span></div>
        <button class="cbs-temp-btn cbs-temp-plus" type="button">+</button>
      </div>
      <div class="cbs-slider-wrap">
        <input class="cbs-slider" type="range" min="16" max="30" step="0.5" value="20">
      </div>
    </div>
    <div class="cbs-mode-section">
      <div class="cbs-section-label">Modalit&agrave;</div>
      <div class="cbs-modes"></div>
    </div>
  </div>

  <!-- Media player bottom sheet overlay -->
  <div id="media-bs-overlay"></div>

  <!-- Media player bottom sheet -->
  <div id="media-bs">
    <div class="mbs-handle"></div>
    <button class="mbs-close" type="button" aria-label="Close">&#10005;</button>

    <!-- Header: cover + info + power -->
    <div class="mbs-header">
      <div class="mbs-cover">
        <div class="mbs-cover-fallback"></div>
        <img class="mbs-cover-img" src="" alt="">
      </div>
      <div class="mbs-info">
        <div class="mbs-title"></div>
        <div class="mbs-artist"></div>
        <div class="mbs-device"></div>
        <div class="mbs-state"></div>
      </div>
      <button class="mbs-power-btn" type="button" aria-label="Power"></button>
    </div>

    <!-- Progress -->
    <div class="mbs-section mbs-progress-section" style="display:none;">
      <div class="mbs-section-label">Riproduzione</div>
      <div class="mbs-progress">
        <div class="mbs-progress-track"><div class="mbs-progress-fill"></div></div>
        <div class="mbs-progress-times"><span class="mbs-time-cur">0:00</span><span class="mbs-time-dur">0:00</span></div>
      </div>
    </div>

    <!-- Transport -->
    <div class="mbs-section mbs-transport-section">
      <div class="mbs-transport"></div>
    </div>

    <div class="mbs-divider"></div>

    <!-- Volume -->
    <div class="mbs-section mbs-volume-section" style="display:none;">
      <div class="mbs-section-label">Volume</div>
      <div class="mbs-volume">
        <button class="mbs-vol-mute" type="button" aria-label="Mute"></button>
        <input class="mbs-vol-slider" type="range" min="0" max="100" step="1" value="50">
        <span class="mbs-vol-pct">50%</span>
      </div>
      <div class="mbs-divider"></div>
    </div>

    <!-- Source -->
    <div class="mbs-section mbs-source-section" style="display:none;">
      <div class="mbs-section-label">Sorgente</div>
      <div class="mbs-select-card">
        <select class="mbs-source-select"></select>
        <span class="mbs-select-arrow"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></span>
      </div>
    </div>

    <!-- Sound mode -->
    <div class="mbs-section mbs-soundmode-section" style="display:none;">
      <div class="mbs-section-label">Modalit&agrave; audio</div>
      <div class="mbs-select-card">
        <select class="mbs-soundmode-select"></select>
        <span class="mbs-select-arrow"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></span>
      </div>
    </div>

    <!-- Grouping -->
    <div class="mbs-section mbs-group-section" style="display:none;">
      <div class="mbs-section-label">Gruppo speaker</div>
      <div class="mbs-group-list"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="notif-toast-container"></div>

  <!-- Alert border overlay — fixed, pointer-events:none, above header/sidebar -->
  <div id="alert-border-overlay"></div>

  <script src="static/js/mdi-icons.js?v=214017"></script>
  <!-- DEV-BUILD-TAG-SCRIPT-START: rimuovere prima del release stable -->
  <script src="static/js/build-tag.js?v=214017"></script>
  <!-- DEV-BUILD-TAG-SCRIPT-END -->
  <script src="static/js/utils/dom.js?v=214017"></script>
  <script src="static/js/utils/format.js?v=214017"></script>
  <script src="static/js/api.js?v=214017"></script>
  <script src="static/js/ws.js?v=214017"></script>
  <script src="static/js/components/bottom-sheet.js?v=214017"></script>
  <script src="static/js/components/light.js?v=214017"></script>
  <script src="static/js/components/switch.js?v=214017"></script>
  <script src="static/js/components/sensor.js?v=214017"></script>
  <script src="static/js/components/alarm.js?v=214017"></script>
  <script src="static/js/components/energy.js?v=214017"></script>
  <script src="static/js/components/scenario.js?v=214017"></script>
  <script src="static/js/components/camera.js?v=214017"></script>
  <script src="static/js/components/cover.js?v=214017"></script>
  <script src="static/js/components/lock.js?v=214017"></script>
  <script src="static/js/components/button.js?v=214017"></script>
  <script src="static/js/components/climate.js?v=214017"></script>
  <script src="static/js/components/calendar.js?v=214017"></script>
  <script src="static/js/components/media.js?v=214017"></script>
  <script src="static/js/components/conditional.js?v=214017"></script>
  <script src="static/js/nav.js?v=214017"></script>
  <script src="static/js/renderer.js?v=214017"></script>
  <script src="static/js/notifications.js?v=214017"></script>
  <script src="static/js/app.js?v=214017"></script>
</body>
</html>
