<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Retro Panel">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#121212">
  <title>Retro Panel</title>

  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/themes.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/components.css">
</head>
<body class="theme-dark">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">Loading…</p>
    </div>
  </div>

  <!-- Main Panel -->
  <div id="panel" class="hidden">

    <!-- Disconnect Banner -->
    <div id="disconnect-banner" class="hidden">
      <span class="banner-dot"></span>
      Reconnecting…
    </div>

    <!-- Header -->
    <header id="panel-header">
      <h1 id="panel-title">Retro Panel</h1>
      <span id="panel-clock"></span>
      <div id="connection-status" class="status-dot status-connected" title="Connected"></div>
      <a id="config-link" href="config" class="header-action" title="Settings" aria-label="Configure entities">&#9881;</a>
    </header>

    <!-- Tile Grid -->
    <main id="tile-grid" style="--columns: 3;"></main>

    <!-- Bottom Tab Bar (populated by app.js) -->
    <nav id="tab-bar"></nav>

  </div>

  <!--
    Scripts loaded in dependency order — NO type="module".
    ES module imports are incompatible with iOS Safari in WKWebView iframes
    (HA companion app). Regular scripts are universally compatible.
  -->
  <script src="static/js/utils/dom.js"></script>
  <script src="static/js/utils/format.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/ws.js"></script>
  <script src="static/js/components/light.js"></script>
  <script src="static/js/components/switch.js"></script>
  <script src="static/js/components/sensor.js"></script>
  <script src="static/js/components/alarm.js"></script>
  <script src="static/js/components/energy.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
