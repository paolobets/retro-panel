<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Retro Panel">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f0f">
  <title>Retro Panel</title>

  <link rel="stylesheet" href="static/css/tokens.css?v=2912">
  <link rel="stylesheet" href="static/css/layout.css?v=2912">
  <link rel="stylesheet" href="static/css/tiles.css?v=2912">
  <link rel="stylesheet" href="static/css/bottom-sheet.css?v=2912">
</head>
<body class="theme-dark">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">Connessione in corso…</p>
    </div>
  </div>

  <!-- Disconnect Banner -->
  <div id="disconnect-banner" class="hidden">
    <span class="banner-dot"></span>
    Riconnessione…
  </div>

  <!-- Main Panel -->
  <div id="panel" class="hidden">

    <!-- Sidebar -->
    <nav id="sidebar">
      <button id="sidebar-toggle" type="button" aria-label="Toggle sidebar">
        <span class="sidebar-toggle-icon">&#9776;</span>
      </button>
      <div class="sidebar-divider"></div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-divider"></div>
      <a id="config-link" href="config" class="sidebar-settings" title="Config" aria-label="Open Config">
        <span class="sidebar-item-icon">&#9881;</span>
        <span class="sidebar-item-label">Config</span>
      </a>
    </nav>

    <!-- Main area -->
    <div id="main-area">

      <!-- Header -->
      <header id="panel-header">
        <h1 id="panel-title">Retro <span style="color:var(--c-accent)">PANEL</span></h1>
        <div id="header-info">
          <span id="panel-date"></span>
          <span id="panel-clock"></span>
        </div>
        <div id="header-sensors"></div>
        <div id="connection-status" class="status-dot status-connected" title="Connected"></div>
      </header>

      <!-- Content area -->
      <main id="content-area"></main>

    </div>
  </div>

  <!-- Bottom sheet overlay -->
  <div id="bs-overlay"></div>

  <!-- Bottom sheet (light controls) -->
  <div id="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="bs-header">
      <span class="bs-title"></span>
      <button class="bs-close" type="button" aria-label="Close">&#10005;</button>
    </div>
    <div class="bs-body">

      <!-- Brightness section -->
      <div class="bs-section" id="bs-section-bri">
        <div class="bs-section-label">Luminosità</div>
        <div class="bs-row">
          <span class="bs-label-text">Livello</span>
          <span class="bs-val" id="bs-bri-val">100%</span>
        </div>
        <input id="bs-bri-slider" class="bs-slider" type="range" min="1" max="255" value="255">
      </div>

      <!-- Color temperature section -->
      <div class="bs-section" id="bs-section-temp">
        <div class="bs-section-label">Temperatura colore</div>
        <div class="bs-row">
          <span class="bs-label-text">Kelvin</span>
          <span class="bs-val" id="bs-temp-val">3000K</span>
        </div>
        <input id="bs-temp-slider" class="bs-slider" type="range" min="153" max="500" value="300">
      </div>

      <!-- Color (hue) section -->
      <div class="bs-section" id="bs-section-color">
        <div class="bs-section-label">Colore</div>
        <div class="bs-row">
          <span class="bs-label-text">Tonalità</span>
          <span class="bs-val">
            <span class="bs-hue-dot" style="display:inline-block;width:16px;height:16px;border-radius:50%;background:hsl(50,80%,55%);vertical-align:middle;"></span>
          </span>
        </div>
        <input id="bs-hue-slider" class="bs-slider" type="range" min="0" max="360" value="50">
        <div class="bs-swatches">
          <div class="bs-swatch" data-hue="50"  style="background:#fffaf0;" title="Warm white"></div>
          <div class="bs-swatch" data-hue="0"   style="background:#ffffff;" title="White"></div>
          <div class="bs-swatch" data-hue="210" style="background:#2196f3;" title="Blue"></div>
          <div class="bs-swatch" data-hue="270" style="background:#845EC2;" title="Purple"></div>
          <div class="bs-swatch" data-hue="120" style="background:#4caf50;" title="Green"></div>
          <div class="bs-swatch" data-hue="0"   style="background:#f44336;" title="Red"></div>
          <div class="bs-swatch" data-hue="30"  style="background:#ff9800;" title="Orange"></div>
          <div class="bs-swatch" data-hue="330" style="background:#e91e63;" title="Pink"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="static/js/mdi-icons.js?v=2912"></script>
  <script src="static/js/utils/dom.js?v=2912"></script>
  <script src="static/js/utils/format.js?v=2912"></script>
  <script src="static/js/api.js?v=2912"></script>
  <script src="static/js/ws.js?v=2912"></script>
  <script src="static/js/components/bottom-sheet.js?v=2912"></script>
  <script src="static/js/components/light.js?v=2912"></script>
  <script src="static/js/components/switch.js?v=2912"></script>
  <script src="static/js/components/sensor.js?v=2912"></script>
  <script src="static/js/components/alarm.js?v=2912"></script>
  <script src="static/js/components/energy.js?v=2912"></script>
  <script src="static/js/components/scenario.js?v=2912"></script>
  <script src="static/js/components/camera.js?v=2912"></script>
  <script src="static/js/nav.js?v=2912"></script>
  <script src="static/js/renderer.js?v=2912"></script>
  <script src="static/js/app.js?v=2912"></script>
</body>
</html>
