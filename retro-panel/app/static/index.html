<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Retro Panel">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#121212">
  <title>Retro Panel</title>

  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/themes.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/components.css">
</head>
<body class="theme-dark">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">Loading…</p>
    </div>
  </div>

  <!-- Main Panel -->
  <div id="panel" class="hidden">

    <!-- Disconnect Banner -->
    <div id="disconnect-banner" class="hidden">
      <span class="banner-dot"></span>
      Reconnecting…
    </div>

    <!-- Sidebar -->
    <nav id="sidebar">
      <!-- Toggle button (left-aligned) -->
      <button id="sidebar-toggle" type="button" aria-label="Toggle sidebar" title="Toggle menu">
        <span class="sidebar-toggle-icon">&#9776;</span>
      </button>

      <div class="sidebar-divider"></div>

      <!-- Navigation items (populated by JS) -->
      <div id="sidebar-nav"></div>

      <!-- Settings gear (bottom of sidebar, icon only) -->
      <div class="sidebar-divider"></div>
      <a id="config-link" href="config" class="sidebar-settings sidebar-settings-bottom" title="Settings" aria-label="Settings">
        <span class="sidebar-item-icon">&#9881;</span>
      </a>
    </nav>

    <!-- Main area (header + content) -->
    <div id="main-area">

      <!-- Header -->
      <header id="panel-header">
        <h1 id="panel-title">Retro Panel</h1>
        <div id="header-info">
          <span id="panel-date"></span>
          <span id="panel-clock"></span>
        </div>
        <div id="header-sensors"></div>
        <div id="connection-status" class="status-dot status-connected" title="Connected"></div>
      </header>

      <!-- Content area (section grids rendered here) -->
      <main id="content-area"></main>

    </div>
  </div>

  <script src="static/js/mdi-icons.js"></script>
  <script src="static/js/utils/dom.js"></script>
  <script src="static/js/utils/format.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/ws.js"></script>
  <script src="static/js/components/light-sheet.js"></script>
  <script src="static/js/components/light.js"></script>
  <script src="static/js/components/switch.js"></script>
  <script src="static/js/components/sensor.js"></script>
  <script src="static/js/components/alarm.js"></script>
  <script src="static/js/components/energy.js"></script>
  <script src="static/js/components/scenario.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
