name: "Retro Panel"
version: "1.0.1"
slug: "retro_panel"
description: >-
  Touch-optimized kiosk dashboard for Home Assistant.
  Designed for wall-mounted tablets and always-on displays.
  Works on iOS 15 Safari, old Android browsers, and any legacy device.
url: "https://github.com/paolobets/retro-panel"
homeassistant: "2023.1.0"
stage: stable
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
ingress: true
ingress_port: 7654
ingress_stream: false
panel_icon: mdi:tablet-dashboard
panel_title: Retro Panel
startup: services
boot: auto
init: false
protected: true
apparmor: true
homeassistant_api: false
hassio_api: false
auth_api: false
map: []
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  panel_title: "Home"
  columns: 3
  theme: "dark"
  kiosk_mode: true
  refresh_interval: 30
  entities: []
schema:
  ha_url: url
  ha_token: password
  panel_title: str
  columns: "list(2|3|4)"
  theme: "list(dark|light|auto)"
  kiosk_mode: bool
  refresh_interval: "int(5,300)"
  entities:
    - entity_id: str
      label: str?
      icon: str?
      row: int?
      col: int?
