configuration:
  ha_url:
    name: URL di Home Assistant
    description: >-
      L'URL della tua istanza Home Assistant.
      Usa l'IP locale (es. http://192.168.1.10:8123) per le migliori prestazioni.
      Non usare homeassistant.local se l'add-on ha problemi a risolvere mDNS.
  ha_token:
    name: Token di Accesso a Lunga Durata
    description: >-
      Crealo in Home Assistant: clicca sulla tua foto profilo (in basso a sinistra),
      scorri fino a "Token di Accesso a Lunga Durata", clicca "Crea Token".
      Copialo subito — viene mostrato una sola volta.
  panel_title:
    name: Titolo Pannello
    description: Il titolo visualizzato nella parte superiore del pannello kiosk.
  columns:
    name: Colonne della Griglia
    description: >-
      Numero di colonne di tile nella griglia.
      2 = tile grandi, 3 = consigliato per iPad in verticale, 4 = schermo orizzontale/largo.
  theme:
    name: Tema
    description: >-
      Tema visivo del pannello.
      "dark" (predefinito) è la scelta migliore per display sempre accesi, riduce il burn-in.
      "auto" segue le impostazioni di sistema del dispositivo.
  refresh_interval:
    name: Intervallo Aggiornamento Fallback (secondi)
    description: >-
      Ogni quanti secondi recuperare gli stati da HA se la connessione WebSocket si interrompe.
      Il pannello tenta sempre prima di riconnettersi via WebSocket. Valore tra 5 e 300 secondi.
  entities:
    name: Entità
    description: >-
      Lista delle entità Home Assistant da mostrare sul pannello.
      Ogni voce richiede solo entity_id. Label, icon, row e col sono opzionali.
      Domini supportati: light, switch, sensor, binary_sensor, alarm_control_panel.
  allowed_direct_ips:
    name: "White List — Accesso Diretto (porta 7654)"
    description: >-
      Indirizzi IP o range CIDR autorizzati ad accedere a Retro Panel direttamente
      sulla porta 7654, senza passare dall'autenticazione di Home Assistant.
      Necessario per dispositivi legacy (es. tablet con browser che non supportano
      la pagina di login di HA).

      COME CONFIGURARE:
      • Autorizzare un singolo dispositivo:  192.168.1.50
      • Autorizzare tutta la rete locale:    192.168.1.0/24
      • Autorizzare tutti (aperto):          0.0.0.0/0
      • Bloccare l'accesso diretto:          lasciare la lista vuota

      Nota: l'accesso tramite HA Ingress (pulsante "Apri interfaccia Web") non è mai
      soggetto a questa lista — è sempre protetto dall'autenticazione di Home Assistant.
