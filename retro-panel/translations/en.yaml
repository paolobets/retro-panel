configuration:
  ha_url:
    name: Home Assistant URL
    description: >-
      The URL of your Home Assistant instance.
      Use your local IP (e.g. http://192.168.1.10:8123) for best performance.
      Do NOT use homeassistant.local if the add-on has trouble resolving mDNS.
  ha_token:
    name: Long-Lived Access Token
    description: >-
      Optional: if left empty it is auto-detected from the SUPERVISOR_TOKEN.
      To use your own, in Home Assistant click your profile picture (bottom-left),
      scroll to "Long-Lived Access Tokens" and click "Create Token".
      Copy it immediately — it is shown only once.
  panel_title:
    name: Panel Title
    description: The title displayed at the top of the kiosk panel.
  theme:
    name: Theme
    description: >-
      Visual theme for the panel.
      "dark" (default) is best for always-on displays to reduce burn-in.
      "auto" follows the device's system preference.
  refresh_interval:
    name: Fallback Poll Interval (seconds)
    description: >-
      How often to re-fetch all entity states from HA if the WebSocket connection drops.
      The panel always tries to reconnect WebSocket first. Set between 5 and 300 seconds.
  notification_ttl_days:
    name: Notification Retention (days)
    description: >-
      How many days to keep panel notifications before they are purged
      automatically. Set between 1 and 365 days.
  allowed_direct_ips:
    name: "White List — Direct Access (port 7654)"
    description: >-
      IP addresses or CIDR ranges allowed to access Retro Panel directly on port 7654,
      without going through Home Assistant authentication. Required for legacy devices
      (e.g. old tablets whose browsers do not support the HA login page).

      For safety the default authorises only private LAN ranges (192.168.x, 10.x,
      172.16-31.x), loopback and link-local — never the whole internet. Tablets on
      your home network are already covered.

      HOW TO CONFIGURE:
      • Authorise a single device:   192.168.1.50
      • Authorise the entire LAN:    192.168.1.0/24
      • VPN/overlay networks (e.g. Tailscale): add its CIDR (e.g. 100.64.0.0/10)
      • Authorise everyone (not recommended):  0.0.0.0/0

      Note: access via HA Ingress ("Open Web UI" button) is never affected by this list —
      it is always protected by Home Assistant authentication.
  hiris_url:
    name: HIRIS URL (optional)
    description: >-
      Internal URL of the HIRIS add-on for the AI assistant integration.
      Leave the default if HIRIS is installed as an add-on on the same host.
  hiris_internal_token:
    name: HIRIS Internal Token (optional)
    description: >-
      Authentication token for internal calls to HIRIS.
      Only needed if your HIRIS integration requires it.
  layout:
    name: Layout
    description: >-
      Panel layout. Currently only "standard" is available.
  ingress_supervisor_cidr:
    name: Supervisor Ingress CIDR (advanced)
    description: >-
      CIDR networks trusted as the HA Supervisor ingress source. The default
      172.30.32.0/23 covers all standard HA installations (Supervised / HA OS).
      CHANGE ONLY for non-standard Docker bridge setups. WARNING: setting this to
      0.0.0.0/0 disables the X-Ingress-Path anti-spoofing protection.
