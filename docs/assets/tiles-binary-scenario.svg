<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220">
  <rect width="700" height="220" fill="#0f0f0f" rx="12"/>

  <!-- Binary sensors label -->
  <text x="20" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" font-weight="600" letter-spacing="0.8">BINARY SENSORS</text>

  <!-- Door OPEN (alert) -->
  <rect x="12" y="36" width="118" height="110" fill="#1a1a1a" rx="14" stroke="#ff9800" stroke-width="2"/>
  <text x="28" y="62" font-size="22" fill="#ff9800">🚪</text>
  <rect x="74" y="50" width="48" height="18" fill="#ff980022" rx="9"/>
  <text x="98" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#ff9800" text-anchor="middle" font-weight="700">APERTA</text>
  <text x="28" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Porta ingresso</text>
  <text x="71" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#666" text-anchor="middle">door</text>

  <!-- Window CLOSED (ok) -->
  <rect x="142" y="36" width="118" height="110" fill="#1a1a1a" rx="14" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="158" y="62" font-size="22" fill="#888">🪟</text>
  <text x="201" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888" text-anchor="end">CHIUSA</text>
  <text x="158" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Finestra</text>
  <text x="201" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#666" text-anchor="middle">window</text>

  <!-- Motion DETECTED -->
  <rect x="272" y="36" width="118" height="110" fill="#1a1a1a" rx="14" stroke="#ff9800" stroke-width="2"/>
  <text x="288" y="62" font-size="22" fill="#ff9800">👁</text>
  <rect x="330" y="50" width="52" height="18" fill="#ff980022" rx="9"/>
  <text x="356" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#ff9800" text-anchor="middle" font-weight="700">RILEV.</text>
  <text x="288" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Corridoio</text>
  <text x="331" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#666" text-anchor="middle">motion</text>

  <!-- Scenarios label -->
  <text x="412" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" font-weight="600" letter-spacing="0.8">SCENARIOS</text>

  <!-- Scene tile -->
  <rect x="402" y="36" width="118" height="110" fill="#1a1a1a" rx="14" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="418" y="62" font-size="22" fill="#2196f3">🎨</text>
  <rect x="460" y="50" width="52" height="17" fill="none" rx="8" stroke="#2196f3" stroke-width="1"/>
  <text x="486" y="61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8.5" fill="#2196f3" text-anchor="middle" font-weight="600">SCENA</text>
  <text x="418" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Serata Cinema</text>
  <text x="461" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#666" text-anchor="middle">scene</text>

  <!-- Automation tile (with custom border colour) -->
  <rect x="532" y="36" width="118" height="110" fill="#1a1a1a" rx="14" stroke="#e91e63" stroke-width="1.5"/>
  <text x="548" y="62" font-size="22" fill="#e91e63">⚡</text>
  <rect x="585" y="50" width="58" height="17" fill="none" rx="8" stroke="#e91e63" stroke-width="1"/>
  <text x="614" y="61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#e91e63" text-anchor="middle" font-weight="600">AUTOMAZ.</text>
  <text x="548" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Buonanotte</text>
  <text x="591" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#666" text-anchor="middle">automation</text>

  <!-- tap → flash annotation -->
  <text x="461" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#4caf50" text-anchor="middle">▶ tap → flash verde 1.5s</text>
  <text x="591" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#e91e63" text-anchor="middle">icona + bordo personalizzati</text>
</svg>
