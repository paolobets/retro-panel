<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440">
  <defs>
    <style>
      .bg       { fill: #0f0f0f; }
      .surface  { fill: #1a1a1a; }
      .surface2 { fill: #222222; }
      .surface3 { fill: #2a2a2a; }
      .accent   { fill: #2196f3; }
      .on       { fill: #4caf50; }
      .warn     { fill: #ff9800; }
      .danger   { fill: #f44336; }
      .amber    { fill: #FFB700; }
      .text-pri  { fill: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text-sec  { fill: #888888; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text-acc  { fill: #2196f3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text-on   { fill: #4caf50; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .radius-tile { rx: "14"; ry: "14"; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="440" fill="#0f0f0f" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="780" height="56" fill="#1a1a1a" rx="12"/>
  <rect x="0" y="40" width="780" height="16" fill="#1a1a1a"/>
  <rect x="0" y="55" width="780" height="2" fill="#222"/>

  <!-- Hamburger icon -->
  <rect x="20" y="20" width="18" height="2" fill="#f0f0f0" rx="1"/>
  <rect x="20" y="27" width="18" height="2" fill="#f0f0f0" rx="1"/>
  <rect x="20" y="34" width="18" height="2" fill="#f0f0f0" rx="1"/>

  <!-- Title -->
  <text x="52" y="33" class="text-pri" font-size="16" font-weight="700" letter-spacing="-0.3">RETRO PANEL</text>

  <!-- Date/time -->
  <text x="570" y="30" class="text-sec" font-size="12">Dom 6 Apr 2026</text>
  <text x="680" y="30" class="text-pri" font-size="14" font-weight="600">09:41</text>

  <!-- WS dot -->
  <circle cx="760" cy="28" r="5" fill="#4caf50"/>

  <!-- Theme badge -->
  <rect x="486" y="19" width="72" height="22" fill="#252525" rx="11"/>
  <text x="522" y="33" class="text-sec" font-size="10" text-anchor="middle">🌙 Scuro</text>

  <!-- Sidebar -->
  <rect x="0" y="56" width="190" height="384" fill="#141414" rx="0"/>
  <rect x="190" y="56" width="1" height="384" fill="#222"/>

  <!-- Sidebar items -->
  <!-- Overview - active -->
  <rect x="8" y="72" width="174" height="36" fill="#1e1e1e" rx="8"/>
  <text x="36" y="94" class="text-pri" font-size="13" font-weight="600">Overview</text>
  <circle cx="24" cy="90" r="5" fill="#2196f3"/>

  <!-- Room 1 -->
  <text x="36" y="131" class="text-sec" font-size="13">🏠  Casa</text>

  <!-- Room 2 -->
  <text x="36" y="167" class="text-sec" font-size="13">🛋  Soggiorno</text>

  <!-- Room 3 -->
  <text x="36" y="203" class="text-sec" font-size="13">🛏  Camera</text>

  <!-- Divider -->
  <rect x="16" y="218" width="158" height="1" fill="#252525"/>

  <!-- Scenarios -->
  <text x="36" y="240" class="text-sec" font-size="13">🎬  Scenari</text>

  <!-- Cameras -->
  <text x="36" y="276" class="text-sec" font-size="13">📹  Telecamere</text>

  <!-- Alarms -->
  <text x="36" y="312" class="text-sec" font-size="13">🔔  Allarme</text>

  <!-- Version badge bottom -->
  <text x="16" y="425" class="text-sec" font-size="10">v2.9.34</text>

  <!-- Content area - section title -->
  <text x="210" y="85" class="text-sec" font-size="11" font-weight="600" letter-spacing="0.8">OVERVIEW</text>

  <!-- ===== ROW 1 of tiles ===== -->

  <!-- Tile 1: Light ON -->
  <rect x="206" y="94" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#4caf50" stroke-width="1.5"/>
  <!-- icon -->
  <text x="222" y="120" font-size="22" fill="#FFB700">💡</text>
  <!-- brightness bubble -->
  <circle cx="352" cy="115" r="16" fill="#252525"/>
  <text x="352" y="120" class="text-on" font-size="10" text-anchor="middle" font-weight="700">73%</text>
  <!-- label -->
  <text x="222" y="182" class="text-pri" font-size="13" font-weight="600">Soggiorno</text>
  <text x="352" y="182" class="text-on" font-size="11" text-anchor="end" font-weight="600">ON</text>

  <!-- Tile 2: Switch OFF -->
  <rect x="382" y="94" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="398" y="120" font-size="22" fill="#888">🔌</text>
  <text x="398" y="182" class="text-pri" font-size="13" font-weight="600">Pompa acqua</text>
  <text x="528" y="182" class="text-sec" font-size="11" text-anchor="end">OFF</text>

  <!-- Tile 3: Temperature sensor -->
  <rect x="558" y="94" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="574" y="120" font-size="22" fill="#ef6c00">🌡</text>
  <text x="641" y="155" class="text-pri" font-size="22" text-anchor="middle" font-weight="700">21.4°</text>
  <text x="641" y="172" class="text-sec" font-size="11" text-anchor="middle">Celsius</text>
  <text x="574" y="182" class="text-pri" font-size="13" font-weight="600">Temperatura</text>

  <!-- ===== ROW 2 of tiles ===== -->

  <!-- Tile 4: Humidity sensor -->
  <rect x="206" y="214" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="222" y="240" font-size="22" fill="#1e88e5">💧</text>
  <text x="289" y="275" class="text-pri" font-size="22" text-anchor="middle" font-weight="700">62%</text>
  <text x="222" y="302" class="text-pri" font-size="13" font-weight="600">Umidità</text>

  <!-- Tile 5: Binary sensor door OPEN -->
  <rect x="382" y="214" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#ff9800" stroke-width="1.5"/>
  <text x="398" y="240" font-size="22" fill="#ff9800">🚪</text>
  <rect x="472" y="230" width="58" height="20" fill="#ff980022" rx="10"/>
  <text x="501" y="244" class="warn" font-size="10" text-anchor="middle" font-weight="700">APERTA</text>
  <text x="398" y="302" class="text-pri" font-size="13" font-weight="600">Porta ingresso</text>

  <!-- Tile 6: Scenario -->
  <rect x="558" y="214" width="166" height="110" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="574" y="240" font-size="22" fill="#2196f3">🎭</text>
  <!-- domain badge -->
  <rect x="650" y="227" width="62" height="18" fill="none" rx="9" stroke="#2196f3" stroke-width="1"/>
  <text x="681" y="239" class="text-acc" font-size="9" text-anchor="middle" font-weight="600">SCENA</text>
  <text x="574" y="302" class="text-pri" font-size="13" font-weight="600">Serata Cinema</text>

  <!-- ===== ROW 3 of tiles ===== -->

  <!-- Tile 7: Battery sensor -->
  <rect x="206" y="334" width="166" height="90" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="222" y="358" font-size="20" fill="#4caf50">🔋</text>
  <!-- battery bar -->
  <rect x="222" y="365" width="130" height="7" fill="#252525" rx="3.5"/>
  <rect x="222" y="365" width="110" height="7" fill="#4caf50" rx="3.5"/>
  <text x="222" y="404" class="text-pri" font-size="13" font-weight="600">Batteria</text>
  <text x="352" y="404" class="text-on" font-size="11" text-anchor="end">85%</text>

  <!-- Tile 8: Energy sensor -->
  <rect x="382" y="334" width="166" height="90" fill="#1a1a1a" rx="14" stroke="#333" stroke-width="1.5"/>
  <text x="398" y="358" font-size="20" fill="#FFB700">⚡</text>
  <text x="465" y="375" class="text-pri" font-size="20" text-anchor="middle" font-weight="700">2.4</text>
  <text x="465" y="390" class="text-sec" font-size="10" text-anchor="middle">kW</text>
  <text x="398" y="404" class="text-pri" font-size="13" font-weight="600">Fotovoltaico</text>

  <!-- Tile 9: Switch ON -->
  <rect x="558" y="334" width="166" height="90" fill="#1a1a1a" rx="14" stroke="#4caf50" stroke-width="1.5"/>
  <text x="574" y="358" font-size="20" fill="#4caf50">🔆</text>
  <text x="574" y="404" class="text-pri" font-size="13" font-weight="600">Luci esterni</text>
  <text x="704" y="404" class="text-on" font-size="11" text-anchor="end" font-weight="600">ON</text>
</svg>
