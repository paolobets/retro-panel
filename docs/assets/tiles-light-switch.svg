<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260" viewBox="0 0 700 260">
  <rect width="700" height="260" fill="#0f0f0f" rx="12"/>

  <!-- Title row -->
  <text x="20" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" font-weight="600" letter-spacing="0.8">LIGHTS  &amp;  SWITCHES</text>

  <!-- === LIGHT TILES === -->

  <!-- Light OFF -->
  <rect x="12" y="40" width="148" height="120" fill="#1a1a1a" rx="14" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="28" y="68" font-size="24" fill="#555">💡</text>
  <text x="28" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f0f0f0" font-weight="600">Lampada</text>
  <text x="148" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#666" text-anchor="end">OFF</text>
  <text x="80" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666" text-anchor="middle">spenta</text>

  <!-- Light ON (73%) -->
  <rect x="172" y="40" width="148" height="120" fill="#1a1a1a" rx="14" stroke="#4caf50" stroke-width="1.5"/>
  <text x="188" y="68" font-size="24" fill="#FFB700">💡</text>
  <!-- brightness arc -->
  <circle cx="300" cy="63" r="19" fill="#222"/>
  <path d="M 286 72 A 19 19 0 0 1 314 72" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <path d="M 286 72 A 19 19 0 0 1 314 72" fill="none" stroke="#FFB700" stroke-width="4" stroke-linecap="round" stroke-dasharray="24 36"/>
  <text x="300" y="67" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#FFB700" text-anchor="middle" font-weight="700">73%</text>
  <text x="188" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f0f0f0" font-weight="600">Soggiorno</text>
  <text x="308" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#4caf50" text-anchor="end" font-weight="600">ON</text>
  <text x="246" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888" text-anchor="middle">tap = toggle</text>

  <!-- Light ON + bottom sheet indicator -->
  <rect x="332" y="40" width="148" height="120" fill="#1a1a1a" rx="14" stroke="#4caf50" stroke-width="1.5"/>
  <text x="348" y="68" font-size="24" fill="#FFB700">💡</text>
  <circle cx="460" cy="63" r="19" fill="#222"/>
  <path d="M 446 72 A 19 19 0 0 1 474 72" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <path d="M 446 72 A 19 19 0 0 1 474 72" fill="none" stroke="#FFB700" stroke-width="4" stroke-linecap="round" stroke-dasharray="40 20"/>
  <text x="460" y="67" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#FFB700" text-anchor="middle" font-weight="700">100%</text>
  <text x="348" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f0f0f0" font-weight="600">Cucina</text>
  <text x="468" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#4caf50" text-anchor="end" font-weight="600">ON</text>
  <text x="406" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888" text-anchor="middle">long-press = sheet</text>

  <!-- Bottom sheet preview -->
  <rect x="332" y="170" width="148" height="80" fill="#1e1e1e" rx="10" stroke="#333" stroke-width="1"/>
  <text x="406" y="188" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#888" text-anchor="middle">── Luminosità ──</text>
  <rect x="348" y="195" width="116" height="5" fill="#2a2a2a" rx="2.5"/>
  <rect x="348" y="195" width="116" height="5" fill="#FFB700" rx="2.5"/>
  <circle cx="464" cy="197.5" r="7" fill="#FFB700"/>
  <text x="406" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#888" text-anchor="middle">── Temperatura colore ──</text>
  <rect x="348" y="224" width="116" height="5" fill="#2a2a2a" rx="2.5"/>
  <rect x="348" y="224" width="58" height="5" fill="#2196f3" rx="2.5"/>
  <circle cx="406" cy="226.5" r="7" fill="#e0e0e0"/>

  <!-- === SWITCH TILES === -->

  <!-- Switch OFF -->
  <rect x="492" y="40" width="100" height="120" fill="#1a1a1a" rx="14" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="508" y="68" font-size="22" fill="#555">🔌</text>
  <text x="508" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Pompa</text>
  <text x="580" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666" text-anchor="end">OFF</text>
  <text x="542" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666" text-anchor="middle">switch</text>

  <!-- Switch ON -->
  <rect x="604" y="40" width="84" height="120" fill="#1a1a1a" rx="14" stroke="#4caf50" stroke-width="1.5"/>
  <text x="620" y="68" font-size="22" fill="#4caf50">🔌</text>
  <text x="620" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Irriga</text>
  <text x="676" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#4caf50" text-anchor="end" font-weight="600">ON</text>
  <text x="646" y="185" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#4caf50" text-anchor="middle">attivo</text>
</svg>
