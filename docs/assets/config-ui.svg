<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440">
  <rect width="780" height="440" fill="#0f0f0f" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="780" height="52" fill="#1a1a1a" rx="12"/>
  <rect x="0" y="36" width="780" height="16" fill="#1a1a1a"/>
  <rect x="0" y="51" width="780" height="2" fill="#222"/>
  <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#f0f0f0" font-weight="700">Retro Panel — Configurazione</text>

  <!-- Save button -->
  <rect x="668" y="14" width="96" height="28" fill="#4caf50" rx="8"/>
  <text x="716" y="32" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Salva</text>

  <!-- Tab bar -->
  <rect x="0" y="52" width="780" height="44" fill="#141414"/>
  <rect x="0" y="95" width="780" height="2" fill="#222"/>

  <!-- Tabs -->
  <rect x="12" y="60" width="110" height="28" fill="#1e1e1e" rx="7"/>
  <text x="67" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" text-anchor="middle" font-weight="600">Overview</text>
  <rect x="0" y="93" width="134" height="3" fill="#2196f3" rx="1.5"/>

  <text x="175" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" text-anchor="middle">Rooms</text>
  <text x="260" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" text-anchor="middle">Scenari</text>
  <text x="350" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" text-anchor="middle">Telecamere</text>
  <text x="440" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888" text-anchor="middle">Allarme</text>

  <!-- ===== LEFT PANEL — Navigation order ===== -->
  <rect x="12" y="108" width="230" height="320" fill="#141414" rx="10"/>
  <text x="28" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f0f0f0" font-weight="700">Ordine navigazione</text>
  <text x="28" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666">Trascina per riordinare</text>

  <!-- nav order items -->
  <rect x="22" y="158" width="210" height="36" fill="#1e1e1e" rx="8"/>
  <text x="42" y="181" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0">🏠  Stanze</text>
  <text x="220" y="181" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444" text-anchor="end">⠿</text>

  <rect x="22" y="202" width="210" height="36" fill="#1e1e1e" rx="8"/>
  <text x="42" y="225" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0">🎬  Scenari</text>
  <text x="220" y="225" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444" text-anchor="end">⠿</text>

  <rect x="22" y="246" width="210" height="36" fill="#1e1e1e" rx="8"/>
  <text x="42" y="269" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0">📹  Telecamere</text>
  <text x="220" y="269" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444" text-anchor="end">⠿</text>

  <rect x="22" y="290" width="210" height="36" fill="#1e1e1e" rx="8"/>
  <text x="42" y="313" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0">🔔  Allarme</text>
  <text x="220" y="313" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444" text-anchor="end">⠿</text>

  <!-- ===== RIGHT PANEL — Entity list ===== -->
  <rect x="254" y="108" width="516" height="320" fill="#141414" rx="10"/>
  <text x="270" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f0f0f0" font-weight="700">Entità Overview</text>
  <text x="270" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666">Trascina per riordinare · Configura label e icona per ognuna</text>

  <!-- Add buttons -->
  <rect x="264" y="156" width="160" height="30" fill="#1e3a5f" rx="8" stroke="#2196f3" stroke-width="1"/>
  <text x="344" y="174" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#2196f3" text-anchor="middle">+ Aggiungi entità</text>

  <rect x="434" y="156" width="200" height="30" fill="#1a2a1a" rx="8" stroke="#4caf50" stroke-width="1"/>
  <text x="534" y="174" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#4caf50" text-anchor="middle">+ Aggiungi flusso energia</text>

  <!-- Entity rows -->
  <!-- Row 1: light -->
  <rect x="264" y="196" width="496" height="40" fill="#1e1e1e" rx="8"/>
  <text x="280" y="220" font-size="16" fill="#FFB700">💡</text>
  <text x="304" y="215" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Soggiorno</text>
  <text x="304" y="229" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666">light.soggiorno</text>
  <rect x="516" y="208" width="60" height="22" fill="#252525" rx="6" stroke="#333" stroke-width="1"/>
  <text x="546" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888" text-anchor="middle">Icona 󰔄</text>
  <rect x="586" y="208" width="50" height="22" fill="#252525" rx="6" stroke="#333" stroke-width="1"/>
  <text x="611" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888" text-anchor="middle">Label</text>
  <text x="648" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444">⠿</text>
  <text x="668" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#555">✕</text>
  <text x="690" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#666">👁</text>

  <!-- Row 2: switch -->
  <rect x="264" y="244" width="496" height="40" fill="#1e1e1e" rx="8"/>
  <text x="280" y="268" font-size="16" fill="#888">🔌</text>
  <text x="304" y="263" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Pompa acqua</text>
  <text x="304" y="277" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666">switch.pompa_acqua</text>
  <text x="648" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444">⠿</text>
  <text x="668" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#555">✕</text>
  <text x="690" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#666">👁</text>

  <!-- Row 3: sensor -->
  <rect x="264" y="292" width="496" height="40" fill="#1e1e1e" rx="8"/>
  <text x="280" y="316" font-size="16" fill="#ef6c00">🌡</text>
  <text x="304" y="311" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0" font-weight="600">Temperatura</text>
  <text x="304" y="325" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#666">sensor.temperatura_soggiorno</text>
  <text x="648" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#444">⠿</text>
  <text x="668" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#555">✕</text>
  <text x="690" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f0f0f0">👁</text>

  <!-- Entity picker modal hint -->
  <rect x="310" y="360" width="390" height="60" fill="#1a2a3a" rx="10" stroke="#2196f388" stroke-width="1"/>
  <text x="340" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#2196f3" font-weight="600">🔍  Entity Picker — 7 400+ icone MDI</text>
  <text x="340" y="398" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888">Cerca in italiano: "tapparella", "umido", "riscaldamento"…</text>
  <text x="340" y="412" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888">Filtra per dominio: Luci · Switch · Sensori · Binari · Allarme</text>
</svg>
