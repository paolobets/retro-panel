<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Panel — Alarm Redesign Mockup</title>
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --s2: #252525; --s3: #333;
  --text: #f0f0f0; --sec: #888; --accent: #2196f3;
  --accent-bg: rgba(33,150,243,0.12); --on: #4caf50;
  --warn: #ff9800; --danger: #f44336; --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Nav ── */
.rp-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--s3);padding:0 12px;overflow-x:auto;position:sticky;top:0;z-index:10;}
.rp-nav-tab{padding:13px 14px;font-size:12px;font-weight:600;color:var(--sec);white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:5px;}
.rp-nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-badge{font-size:9px;background:var(--accent-bg);color:var(--accent);border-radius:8px;padding:1px 5px;font-weight:700;}

/* ── Mockup header ── */
.m-hdr{background:linear-gradient(135deg,rgba(33,150,243,0.08),transparent);border-bottom:1px solid var(--s3);padding:16px 18px;}
.m-hdr h1{font-size:15px;font-weight:700;color:var(--accent);}
.m-hdr p{font-size:12px;color:var(--sec);margin-top:3px;}

/* ── Scenario tabs ── */
.sc-bar{display:flex;overflow-x:auto;padding:14px 14px 0;gap:8px;}
.sc-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s2);color:var(--sec);border:1px solid transparent;cursor:pointer;line-height:1.4;}
.sc-tab.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}
.sc-sub{display:block;font-size:9px;font-weight:400;opacity:0.7;margin-top:1px;}

/* ── Layout ── */
.main{display:flex;align-items:flex-start;padding:14px;gap:14px;flex-wrap:wrap;}
.card-col{flex:0 0 auto;width:100%;max-width:420px;}
.info-col{flex:1;min-width:220px;max-width:340px;}
@media(max-width:680px){.info-col{max-width:100%;}}

/* ── Info boxes ── */
.ibox{background:var(--surface);border:1px solid var(--s3);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.ibox-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--sec);margin-bottom:10px;}
.attr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--s2);font-size:11px;}
.attr-row:last-child{border:none;}
.attr-key{color:var(--sec);}
.attr-val{font-weight:600;font-family:'SF Mono',monospace;font-size:10.5px;}
.v-num{color:#81c784;} .v-txt{color:#4fc3f7;} .v-null{color:var(--sec);font-style:italic;}
.hint{background:var(--s2);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;font-size:11px;line-height:1.6;color:var(--sec);}
.hint strong{color:var(--text);}
.pin-demo{background:#1a1a2e;border:1px solid rgba(33,150,243,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#64b5f6;margin-top:8px;}
.st-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--s2);font-size:11px;}
.st-row:last-child{border:none;}
.st-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── ALARM CARD ── */
.alarm-card{background:var(--surface);border-radius:var(--r);overflow:hidden;border:1px solid var(--s3);}

/* Status header */
.alarm-status{padding:18px 20px 14px;position:relative;}
.s-disarmed{background:linear-gradient(135deg,rgba(100,100,100,0.08),transparent);}
.s-armed{background:linear-gradient(135deg,rgba(33,150,243,0.10),transparent);}
.s-arming,.s-disarming{background:linear-gradient(135deg,rgba(255,152,0,0.10),transparent);}
.s-triggered{background:linear-gradient(135deg,rgba(244,67,54,0.16),transparent);}
.st-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.bdot{width:7px;height:7px;border-radius:50%;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.bdot.d-disarmed{background:#666;}
.bdot.d-armed{background:var(--accent);}
.bdot.d-arming,.bdot.d-disarming{background:var(--warn);animation:blink 1s ease-in-out infinite;}
.bdot.d-triggered{background:var(--danger);animation:blink 0.7s ease-in-out infinite;}
.alarm-name{font-size:18px;font-weight:700;color:var(--text);}
.alarm-sub{font-size:12px;color:var(--sec);margin-top:2px;}

/* Body */
.alarm-body{padding:14px 18px 18px;}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--sec);margin-bottom:8px;}

/* Mode chips */
.modes-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:24px;font-size:13px;font-weight:600;background:var(--s2);color:var(--sec);border:2px solid transparent;cursor:pointer;transition:all 0.15s;user-select:none;touch-action:manipulation;}
.chip:active{transform:scale(0.94);}
.chip.selected,.chip.arm-selected{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}
.chip.disarm-chip{background:rgba(244,67,54,0.08);color:var(--danger);}
.chip.disarm-chip.selected{border-color:var(--danger);background:rgba(244,67,54,0.15);}
.chip.direct:hover{background:rgba(33,150,243,0.08);color:var(--accent);}

/* Separator */
.sep{height:1px;background:var(--s3);margin-bottom:14px;}

/* PIN display */
.pin-display{background:var(--s2);border-radius:10px;padding:12px;font-size:22px;letter-spacing:14px;text-align:center;min-height:52px;color:var(--text);margin-bottom:8px;border:2px solid var(--s3);transition:border-color 0.2s;}
.pin-display.has-val{border-color:var(--accent);}
.pin-display.err{border-color:var(--danger);}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.pin-display.shaking{animation:shake 0.35s ease;}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.key{height:52px;border-radius:10px;background:var(--s2);border:1px solid var(--s3);font-size:19px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:manipulation;transition:background 0.1s;}
.key:active{background:var(--s3);transform:scale(0.93);}
.key.key-del{font-size:15px;color:var(--sec);}
.key.key-empty{background:transparent;border-color:transparent;pointer-events:none;}

/* Text input */
.text-inp{width:100%;background:var(--s2);border:2px solid var(--s3);border-radius:10px;padding:14px;font-size:16px;color:var(--text);font-family:inherit;outline:none;margin-bottom:8px;-webkit-appearance:none;}
.text-inp:focus{border-color:var(--accent);}

/* Error */
.pin-err{font-size:11px;color:var(--danger);text-align:center;min-height:16px;margin-bottom:8px;}

/* Buttons */
.btn{width:100%;height:48px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;user-select:none;touch-action:manipulation;transition:opacity 0.15s,transform 0.1s;}
.btn:active{opacity:0.8;transform:scale(0.98);}
.btn-arm{background:var(--accent);color:#fff;}
.btn-disarm{background:rgba(244,67,54,0.12);color:var(--danger);border:1px solid rgba(244,67,54,0.3);}
.btn-disarm-danger{background:var(--danger);color:#fff;}
.btn-direct-disarm{background:rgba(244,67,54,0.1);color:var(--danger);border:1px solid rgba(244,67,54,0.2);width:100%;height:48px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-direct-disarm:active{background:rgba(244,67,54,0.22);}

/* Arming animation */
.arming-view{text-align:center;padding:20px 0 8px;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{width:34px;height:34px;border:3px solid var(--s3);border-top-color:var(--warn);border-radius:50%;display:inline-block;animation:spin 0.75s linear infinite;margin-bottom:10px;}
.arming-msg{font-size:14px;font-weight:600;color:var(--warn);}
.triggered-banner{background:rgba(244,67,54,0.12);border:1px solid rgba(244,67,54,0.3);border-radius:10px;padding:12px;text-align:center;font-size:13px;font-weight:600;color:var(--danger);margin-bottom:14px;letter-spacing:0.02em;}

/* Reset button */
.reset-btn{display:inline-block;margin-top:10px;font-size:11px;color:var(--sec);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;}
.reset-btn:hover{color:var(--text);}
</style>
</head>
<body>

<!-- Fake nav -->
<nav class="rp-nav">
  <div class="rp-nav-tab">🏠 Overview</div>
  <div class="rp-nav-tab">🚪 Stanze</div>
  <div class="rp-nav-tab active">🔒 Allarme <span class="nav-badge">NUOVO</span></div>
  <div class="rp-nav-tab">📷 Camere</div>
</nav>

<!-- Header -->
<div class="m-hdr">
  <h1>Alarm Redesign — Mockup Funzionale v1.0</h1>
  <p>Seleziona uno scenario per simulare diversi attributi Home Assistant · PIN demo: <strong style="color:#81c784">1234</strong> (testo: <strong style="color:#4fc3f7">casa123</strong>)</p>
</div>

<!-- Scenario selector -->
<div class="sc-bar">
  <button class="sc-tab active" onclick="setScenario('A')">
    Scenario A<span class="sc-sub">Numerico · PIN arm+disarm · 3 modalità</span>
  </button>
  <button class="sc-tab" onclick="setScenario('B')">
    Scenario B<span class="sc-sub">Nessun codice · 2 modalità</span>
  </button>
  <button class="sc-tab" onclick="setScenario('C')">
    Scenario C<span class="sc-sub">Alfanumerico · PIN arm+disarm</span>
  </button>
  <button class="sc-tab" onclick="setScenario('D')">
    Scenario D<span class="sc-sub">Numerico · PIN solo disarmo</span>
  </button>
  <button class="sc-tab" onclick="setScenario('E')">
    Scenario E<span class="sc-sub">Triggered · disarmo emergenza</span>
  </button>
</div>

<!-- Main layout -->
<div class="main">
  <div class="card-col">
    <div id="alarm-card"></div>
    <button class="reset-btn" onclick="resetScenario()">↺ Reimposta stato iniziale</button>
  </div>
  <div class="info-col">
    <div id="attr-box"></div>
    <div id="state-box"></div>
    <div id="hint-box"></div>
  </div>
</div>

<script>
'use strict';

var CORRECT_PIN = '1234';
var CORRECT_TEXT = 'casa123';

var MODES = [
  { key: 'home',    label: '🏠 Casa',    service: 'alarm_arm_home',    feature: 1 },
  { key: 'away',    label: '🚗 Fuori',   service: 'alarm_arm_away',    feature: 2 },
  { key: 'night',   label: '🌙 Notte',   service: 'alarm_arm_night',   feature: 4 }
];

var SCENARIOS = {
  A: {
    name: 'Numerico — tutte le modalità',
    code_format: 'number',
    code_arm_required: true,
    supported_features: 7,
    initialState: 'disarmed'
  },
  B: {
    name: 'Nessun codice',
    code_format: null,
    code_arm_required: false,
    supported_features: 3,
    initialState: 'disarmed'
  },
  C: {
    name: 'Alfanumerico',
    code_format: 'text',
    code_arm_required: true,
    supported_features: 3,
    initialState: 'disarmed'
  },
  D: {
    name: 'Numerico — PIN solo disarmo',
    code_format: 'number',
    code_arm_required: false,
    supported_features: 3,
    initialState: 'disarmed'
  },
  E: {
    name: 'Triggered — allarme attivo',
    code_format: 'number',
    code_arm_required: true,
    supported_features: 7,
    initialState: 'triggered'
  }
};

var currentScenario = 'A';
var states = {};

function freshState(sc) {
  return {
    alarmState: SCENARIOS[sc].initialState,
    armedMode: null,
    selectedMode: null,
    pin: '',
    textCode: '',
    error: ''
  };
}

function getState() {
  if (!states[currentScenario]) { states[currentScenario] = freshState(currentScenario); }
  return states[currentScenario];
}

function setScenario(sc) {
  currentScenario = sc;
  document.querySelectorAll('.sc-tab').forEach(function(t, i) {
    t.classList.toggle('active', Object.keys(SCENARIOS)[i] === sc);
  });
  render();
}

function resetScenario() {
  states[currentScenario] = freshState(currentScenario);
  render();
}

/* ── Render helpers ── */
function stateLabel(st, mode) {
  var labels = {
    disarmed:  '🔓 Disarmato',
    armed:     '🔒 Armato' + (mode ? ' — ' + mode : ''),
    arming:    '⏳ Inserimento...',
    disarming: '⏳ Disarmo...',
    triggered: '🚨 Allarme Attivo'
  };
  return labels[st] || st;
}

function stateClass(st) {
  if (st === 'armed') return 's-armed';
  if (st === 'triggered') return 's-triggered';
  if (st === 'arming' || st === 'disarming') return 's-arming';
  return 's-disarmed';
}

function dotClass(st) {
  if (st === 'armed') return 'd-armed';
  if (st === 'triggered') return 'd-triggered';
  if (st === 'arming' || st === 'disarming') return 'd-arming';
  return 'd-disarmed';
}

function fmtModeName(key) {
  if (key === 'home') return 'Casa';
  if (key === 'away') return 'Fuori';
  if (key === 'night') return 'Notte';
  return key;
}

/* ── Event handlers ── */
window._selectMode = function(key) {
  var sc = SCENARIOS[currentScenario];
  var st = getState();
  if (st.alarmState !== 'disarmed') return;
  if (sc.code_arm_required) {
    st.selectedMode = (st.selectedMode === key) ? null : key;
    st.pin = '';
    st.textCode = '';
    st.error = '';
  } else {
    st.selectedMode = key;
    setTimeout(function() { _doArm(key); }, 60);
  }
  render();
};

window._doArm = function(key) {
  var st = getState();
  st.alarmState = 'arming';
  st.selectedMode = key;
  render();
  setTimeout(function() {
    st.alarmState = 'armed';
    st.armedMode = fmtModeName(key);
    st.pin = '';
    st.textCode = '';
    st.selectedMode = null;
    render();
  }, 1400);
};

window._doDisarm = function() {
  var st = getState();
  st.alarmState = 'disarming';
  st.selectedMode = null;
  render();
  setTimeout(function() {
    st.alarmState = 'disarmed';
    st.armedMode = null;
    st.pin = '';
    st.textCode = '';
    st.error = '';
    render();
  }, 1200);
};

window._addDigit = function(d) {
  var st = getState();
  if (st.pin.length < 8) { st.pin += d; st.error = ''; }
  renderPinDisplay();
};

window._delDigit = function() {
  var st = getState();
  st.pin = st.pin.slice(0, -1);
  renderPinDisplay();
};

window._confirm = function() {
  var sc = SCENARIOS[currentScenario];
  var st = getState();
  var code = sc.code_format === 'text' ? st.textCode : st.pin;
  var correct = sc.code_format === 'text' ? CORRECT_TEXT : CORRECT_PIN;

  if (code !== correct) {
    st.error = 'Codice non corretto';
    st.pin = '';
    st.textCode = '';
    var pd = document.getElementById('pin-display');
    if (pd) {
      pd.classList.add('err');
      pd.classList.add('shaking');
      setTimeout(function() { pd.classList.remove('shaking','err'); }, 400);
    }
    renderPinDisplay();
    return;
  }

  if (st.alarmState === 'disarmed' && st.selectedMode) {
    _doArm(st.selectedMode);
  } else {
    _doDisarm();
  }
};

window._directDisarm = function() {
  _doDisarm();
};

window._textChange = function(el) {
  var st = getState();
  st.textCode = el.value;
  st.error = '';
};

/* ── Render ── */
function renderPinDisplay() {
  var st = getState();
  var pd = document.getElementById('pin-display');
  if (!pd) return;
  pd.textContent = '●'.repeat(st.pin.length) || '';
  pd.classList.toggle('has-val', st.pin.length > 0);
}

function buildAlarmCard() {
  var sc = SCENARIOS[currentScenario];
  var st = getState();
  var html = '';

  /* Status header */
  var armedLabel = st.armedMode ? fmtModeName(st.armedMode) : '';
  html += '<div class="alarm-status ' + stateClass(st.alarmState) + '">';
  html += '<div class="st-badge"><span class="bdot ' + dotClass(st.alarmState) + '"></span>';
  if (st.alarmState === 'disarmed') html += '<span style="color:var(--sec)">DISARMATO</span>';
  else if (st.alarmState === 'armed') html += '<span style="color:var(--accent)">ARMATO</span>';
  else if (st.alarmState === 'arming') html += '<span style="color:var(--warn)">INSERIMENTO...</span>';
  else if (st.alarmState === 'disarming') html += '<span style="color:var(--warn)">DISARMO...</span>';
  else if (st.alarmState === 'triggered') html += '<span style="color:var(--danger)">ALLARME ATTIVO</span>';
  html += '</div>';
  html += '<div class="alarm-name">Allarme Casa</div>';
  if (st.alarmState === 'armed' && st.armedMode) {
    html += '<div class="alarm-sub">Modalità: ' + st.armedMode + '</div>';
  }
  html += '</div>';

  /* Body */
  html += '<div class="alarm-body">';

  /* ARMING / DISARMING spinner */
  if (st.alarmState === 'arming' || st.alarmState === 'disarming') {
    html += '<div class="arming-view">';
    html += '<div class="spinner"></div><br>';
    html += '<div class="arming-msg">' + (st.alarmState === 'arming' ? 'Inserimento in corso...' : 'Disarmo in corso...') + '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  /* TRIGGERED */
  if (st.alarmState === 'triggered') {
    html += '<div class="triggered-banner">⚠️ Allarme rilevato — Inserisci codice per disarmare</div>';
    html += '<div class="section-lbl">Codice di emergenza</div>';
    html += buildPinSection(sc, st, 'disarm');
    html += '</div>';
    return html;
  }

  /* DISARMED → mode selection */
  if (st.alarmState === 'disarmed') {
    html += '<div class="section-lbl">Seleziona modalità</div>';
    html += '<div class="modes-row">';
    MODES.forEach(function(m) {
      if (!(sc.supported_features & m.feature)) return;
      var isSel = st.selectedMode === m.key;
      var cls = 'chip' + (isSel ? ' selected' : '') + (sc.code_arm_required ? '' : ' direct');
      html += '<button class="' + cls + '" onclick="_selectMode(\'' + m.key + '\')">' + m.label + '</button>';
    });
    html += '</div>';

    if (sc.code_arm_required && st.selectedMode) {
      html += '<div class="sep"></div>';
      html += '<div class="section-lbl">Codice accesso</div>';
      html += buildPinSection(sc, st, 'arm');
    } else if (!sc.code_arm_required) {
      html += '<div class="hint" style="margin-top:0;font-size:11px;color:var(--sec);">Tap su una modalità per armare direttamente — nessun codice richiesto.</div>';
    }
    html += '</div>';
    return html;
  }

  /* ARMED */
  if (st.alarmState === 'armed') {
    if (sc.code_format === null) {
      /* No code → direct disarm */
      html += '<div class="section-lbl">Disarmo</div>';
      html += '<button class="btn-direct-disarm" onclick="_directDisarm()">🔓 Disarma</button>';
    } else {
      html += '<div class="section-lbl">Codice disarmo</div>';
      html += buildPinSection(sc, st, 'disarm');
    }
    html += '</div>';
    return html;
  }

  html += '</div>';
  return html;
}

function buildPinSection(sc, st, action) {
  var html = '';
  if (sc.code_format === 'number') {
    html += '<div class="pin-display" id="pin-display">' + '●'.repeat(st.pin.length) + '</div>';
    html += '<div class="keypad">';
    var keys = ['1','2','3','4','5','6','7','8','9','del','0',''];
    keys.forEach(function(k) {
      if (k === 'del') html += '<button class="key key-del" onclick="_delDigit()">⌫</button>';
      else if (k === '') html += '<div class="key key-empty"></div>';
      else html += '<button class="key" onclick="_addDigit(\'' + k + '\')">' + k + '</button>';
    });
    html += '</div>';
  } else if (sc.code_format === 'text') {
    html += '<input class="text-inp" type="password" inputmode="text" autocomplete="off" autocorrect="off" placeholder="Codice accesso..." oninput="_textChange(this)" value="' + (st.textCode || '') + '" />';
  }

  if (st.error) { html += '<div class="pin-err">' + st.error + '</div>'; }
  else { html += '<div class="pin-err"></div>'; }

  var btnCls = action === 'disarm' ? (st.alarmState === 'triggered' ? 'btn btn-disarm-danger' : 'btn btn-disarm') : 'btn btn-arm';
  var btnLabel = action === 'disarm' ? '🔓 Disarma' : (st.selectedMode ? '✓ Arma ' + fmtModeName(st.selectedMode) : '✓ Conferma');
  html += '<button class="' + btnCls + '" onclick="_confirm()">' + btnLabel + '</button>';
  return html;
}

function buildAttrBox() {
  var sc = SCENARIOS[currentScenario];
  var fmtF = function(v) {
    if (v === null) return '<span class="attr-val v-null">null</span>';
    if (v === 'number') return '<span class="attr-val v-num">"number"</span>';
    if (v === 'text') return '<span class="attr-val v-txt">"text"</span>';
    if (v === true) return '<span class="attr-val v-num">true</span>';
    if (v === false) return '<span class="attr-val v-null">false</span>';
    return '<span class="attr-val">' + v + '</span>';
  };
  var feats = [];
  if (sc.supported_features & 1) feats.push('ARM_HOME');
  if (sc.supported_features & 2) feats.push('ARM_AWAY');
  if (sc.supported_features & 4) feats.push('ARM_NIGHT');
  var featHtml = '<span class="attr-val" style="color:#ce93d8">' + feats.join(' | ') + '</span>';

  return '<div class="ibox">' +
    '<div class="ibox-title">📡 Attributi Home Assistant (simulati)</div>' +
    '<div class="attr-row"><span class="attr-key">code_format</span>' + fmtF(sc.code_format) + '</div>' +
    '<div class="attr-row"><span class="attr-key">code_arm_required</span>' + fmtF(sc.code_arm_required) + '</div>' +
    '<div class="attr-row"><span class="attr-key">supported_features</span>' + featHtml + '</div>' +
    '</div>';
}

function buildStateBox() {
  var st = getState();
  var states_info = [
    { st:'disarmed', dot:'#666', label:'Disarmato' },
    { st:'armed', dot:'var(--accent)', label:'Armato' },
    { st:'arming', dot:'var(--warn)', label:'Inserimento/Disarmo' },
    { st:'triggered', dot:'var(--danger)', label:'Triggered' }
  ];
  var stateColors = { disarmed:'#666', armed:'var(--accent)', arming:'var(--warn)', disarming:'var(--warn)', triggered:'var(--danger)' };
  var cur = st.alarmState === 'disarming' ? 'arming' : st.alarmState;
  var html = '<div class="ibox"><div class="ibox-title">🔄 Stato corrente HA</div>';
  states_info.forEach(function(s) {
    var active = (s.st === cur || (s.st === 'arming' && (st.alarmState === 'arming' || st.alarmState === 'disarming')));
    html += '<div class="st-row">';
    html += '<div class="st-dot" style="background:' + s.dot + ';' + (active ? '' : 'opacity:0.3') + '"></div>';
    html += '<span style="' + (active ? 'color:' + s.dot + ';font-weight:700' : 'color:var(--sec)') + '">' + s.label + '</span>';
    if (active) html += ' <span style="font-size:10px;color:var(--sec)">← attuale</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function buildHintBox() {
  var sc = SCENARIOS[currentScenario];
  var hints = {
    A: '<strong>Scenario A:</strong> PIN numerico obbligatorio per armare <em>e</em> disarmare. Tutte e 3 le modalità disponibili (HOME/AWAY/NIGHT).<div class="pin-demo">📌 PIN demo: <strong>1234</strong></div>',
    B: '<strong>Scenario B:</strong> Nessun codice richiesto. Tap su modalità → azione immediata. Disarmo diretto senza PIN. Tipico per sistemi di allarme interni senza codice.',
    C: '<strong>Scenario C:</strong> Codice alfanumerico — la tastiera numerica scompare, viene usato l\'input nativo iOS con tastiera completa.<div class="pin-demo">📌 Codice demo: <strong>casa123</strong></div>',
    D: '<strong>Scenario D:</strong> <code>code_arm_required: false</code> — armare è immediato (tap diretto), ma disarmare richiede il PIN. Caso comune per allarmi domestici.<div class="pin-demo">📌 PIN demo: <strong>1234</strong></div>',
    E: '<strong>Scenario E:</strong> Stato triggered — la card entra in modalità emergenza. Solo il disarmo è possibile, con PIN obbligatorio.<div class="pin-demo">📌 PIN demo: <strong>1234</strong></div>'
  };
  return '<div class="ibox"><div class="ibox-title">💡 Note scenario</div><div style="font-size:11px;line-height:1.7;color:var(--sec)">' + hints[currentScenario] + '</div></div>';
}

function render() {
  document.getElementById('alarm-card').innerHTML = buildAlarmCard();
  document.getElementById('attr-box').innerHTML = buildAttrBox();
  document.getElementById('state-box').innerHTML = buildStateBox();
  document.getElementById('hint-box').innerHTML = buildHintBox();
}

render();
</script>
</body>
</html>
